name: GitHub 이슈 생성 시 Jira Task 자동 생성 + 에픽/일정 자동 연결

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Jira 로그인
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}

      - name: Checkout
        uses: actions/checkout@v4

      # (권장) jq 설치 - runner에 기본 탑재인 경우가 많지만 안전하게 설치
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # 1. 이슈 본문에서 epic/start/due 정보 추출
      - name: Extract Epic/Date Info
        id: extract_info
        run: |
          BODY="${{ github.event.issue.body }}"
          EPIC_KEY=$(printf '%s\n' "$BODY" \
            | sed 's/\r$//' \
            | grep -iE '^[[:space:]]*[-*]?[[:space:]]*epic:[[:space:]]*[A-Z][A-Z0-9_]*-[0-9]+' \
            | head -1 \
            | sed -E 's/.*epic:[[:space:]]*//I')

          START_DATE=$(printf '%s\n' "$BODY" \
            | sed 's/\r$//' \
            | grep -iE '^[[:space:]]*[-*]?[[:space:]]*start:[[:space:]]*[0-9]{4}-[0-9]{2}-[0-9]{2}' \
            | head -1 \
            | sed -E 's/.*start:[[:space:]]*//I')

          DUE_DATE=$(printf '%s\n' "$BODY" \
            | sed 's/\r$//' \
            | grep -iE '^[[:space:]]*[-*]?[[:space:]]*due:[[:space:]]*[0-9]{4}-[0-9]{2}-[0-9]{2}' \
            | head -1 \
            | sed -E 's/.*due:[[:space:]]*//I')

          echo "EPIC_KEY=$EPIC_KEY" >> $GITHUB_ENV
          echo "START_DATE=$START_DATE" >> $GITHUB_ENV
          echo "DUE_DATE=$DUE_DATE" >> $GITHUB_ENV

          echo "DEBUG EPIC_KEY=$EPIC_KEY"
          echo "DEBUG START_DATE=$START_DATE"
          echo "DEBUG DUE_DATE=$DUE_DATE"

      # 2. GitHub assignee → Jira accountId 매핑 (선택)
      - name: Resolve assignee (GitHub login -> Jira accountId)
        id: resolve_assignee
        run: |
          if [ ! -f ".github/jira-users.json" ]; then
            echo "ASSIGNEE_ID=" >> $GITHUB_ENV
            exit 0
          fi

          ASSIGNEES=$(jq -r '.issue.assignees[].login // empty' <<< '${{ toJson(github.event) }}')
          SELECTED_ID=""
          for GH in $ASSIGNEES; do
            JIRA_ID=$(jq -r --arg k "$GH" '.[$k] // empty' .github/jira-users.json)
            if [ -n "$JIRA_ID" ]; then
              SELECTED_ID="$JIRA_ID"
              break
            fi
          done

          echo "ASSIGNEE_ID=$SELECTED_ID" >> $GITHUB_ENV

      # 3. Jira fields JSON 생성
      # - Team-managed 프로젝트 기준: Epic 연결은 customfield가 아니라 parent.key로 처리
      # - Start date: customfield_10015 (네가 확인한 필드)
      # - Due date: duedate (표준 필드)
      - name: Build Jira fields JSON
        run: |
          FIELDS=$(jq -n \
            --arg epic   "${EPIC_KEY}" \
            --arg start  "${START_DATE}" \
            --arg due    "${DUE_DATE}" \
            --arg assId  "${ASSIGNEE_ID}" \
            '{
               customfield_10015: $start,
               duedate: $due
             }
             | if $epic != "" then .parent = { key: $epic } else . end
             | if $assId != "" then .assignee = { id: $assId } else . end
             | with_entries(select(.value != ""))'
          )

          {
            echo "FIELDS_JSON<<EOF"
            echo "$FIELDS"
            echo "EOF"
          } >> $GITHUB_ENV

      # 4. Jira 이슈(Task) 생성 - (+ Epic/일정/Assignee 자동 연결)
      - name: Jira 이슈 생성 (에픽/일정 자동 연결)
        id: create_jira
        uses: atlassian/gajira-create@v3
        with:
          project: SY2026
          issuetype: Task
          summary: '${{ github.event.issue.title }}'
          description: |
            GitHub Issue: [${{ github.event.issue.title }}](${{ github.event.issue.html_url }})
            작성자: ${{ github.event.issue.user.login }}
            본문:
            ${{ github.event.issue.body }}
          fields: ${{ env.FIELDS_JSON }}

      # 5. 생성된 Jira 이슈키를 Github 이슈에 코멘트로 기록
      - name: 생성된 Jira 이슈키를 Github 이슈에 코멘트로 기록
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔗 **Jira 이슈가 생성되었습니다:** [${{ steps.create_jira.outputs.issue }}](${{ secrets.JIRA_BASE_URL }}/browse/${{ steps.create_jira.outputs.issue }})`
            })