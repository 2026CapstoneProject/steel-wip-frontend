name: GitHub 이슈 종료 시 Jira Task 자동 완료 처리

on:
  issues:
    types: [closed]

permissions:
  issues: read

jobs:
  close-jira-issue:
    name: Close linked Jira issue
    runs-on: ubuntu-latest
    steps:
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # 우리가 남긴 "Jira 생성 코멘트"에서만 Jira Key 추출 (가장 안전)
      - name: Extract Jira Key from comments
        id: extract_jira
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENTS_URL: ${{ github.event.issue.comments_url }}
        run: |
          # 코멘트 목록 가져오기(최대 100개)
          COMMENTS_JSON=$(curl -sS \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${COMMENTS_URL}?per_page=100")

          # "Jira 이슈가 생성되었습니다" 코멘트에서만 키 추출
          JIRA_KEY=$(echo "$COMMENTS_JSON" | jq -r '
            .[] | select(.body | test("Jira 이슈가 생성되었습니다")) | .body
          ' | grep -oE '[A-Z]+-[0-9]+' | head -1)

          if [ -z "$JIRA_KEY" ]; then
            echo "JIRA_KEY=" >> $GITHUB_ENV
            echo "No Jira key found. Skipping transition."
            exit 0
          fi

          echo "JIRA_KEY=$JIRA_KEY" >> $GITHUB_ENV
          echo "Found Jira key: $JIRA_KEY"

      - name: Jira 로그인
        if: env.JIRA_KEY != ''
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}

      # 완료 전환: Transition ID 사용(가장 안정적)
      - name: Jira 이슈 완료 처리 (Transition ID)
        if: env.JIRA_KEY != ''
        uses: atlassian/gajira-transition@v3
        with:
          issue: ${{ env.JIRA_KEY }}
          transition: ${{ secrets.JIRA_DONE_TRANSITION_ID }}